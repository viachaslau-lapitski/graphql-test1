# Prometheus configuration for the GraphQL showcase stack
# Scrapes /actuator/prometheus from both Spring Boot services

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'market-data-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['market-data-service:8081']
        labels:
          service: market-data-service

  - job_name: 'order-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['order-service:8082']
        labels:
          service: order-service
